name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff (changed files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Collect changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          {
            echo "files<<EOF"
            git diff --name-only "$BASE"...${{ github.sha }} -- "*.py"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run ruff
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          printf '%s\n' "$CHANGED_FILES" | xargs -r ruff check --extend-ignore N802,N803,N806

      - name: Skip ruff (no Python changes)
        if: steps.changed.outputs.files == ''
        run: echo "No changed Python files."

  typecheck:
    name: Mypy (changed files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Collect changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          {
            echo "files<<EOF"
            git diff --name-only "$BASE"...${{ github.sha }} -- "*.py"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run mypy
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          printf '%s\n' "$CHANGED_FILES" | xargs -r mypy --ignore-missing-imports --follow-imports=silent

      - name: Skip mypy (no Python changes)
        if: steps.changed.outputs.files == ''
        run: echo "No changed Python files."

  test:
    name: Pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests -v
